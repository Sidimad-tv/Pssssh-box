on:
  push:
    branches: [main, master, gh-pages]
  workflow_dispatch:

name: deploy

jobs:
  deploy:
    name: Build and publish to GitHub pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    permissions:
       contents: read
       pages: write
       id-token: write

    # Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
    # However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
    concurrency:
      group: "pages"
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
           targets: wasm32-unknown-unknown

      - name: Install protoc compiler
        run: |
          sudo apt-get update
          sudo apt-get install protobuf-compiler

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
           version: 'latest'

      - uses: taiki-e/install-action@v2.77.6
        with:
           tool: zola

      # This builds our Rust code as WASM, then copies the small local Python wheel
      # needed by the Pyodide-powered pages.
      - name: Build bundle
        run: |
           rm -rf dist/
           (cd www-zola && zola build --output-dir ../dist)
           wasm-pack build --release --target web
           # The generated WebAssembly
           cp -r pkg dist
           # Construct 2.8.8 is required by pywidevine via pymp4, but is not available
           # as a wheel from PyPI. Pyodide itself is loaded from the CDN by the pages.
           cp -r pyodide dist
           find dist -type d -print0 | xargs -0 chmod 755
           find dist -type f -print0 | xargs -0 chmod 644

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: './dist'
          retention-days: 2

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        
